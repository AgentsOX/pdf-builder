# Freeform path with LaTeX math (the default). Single-quoted YAML keeps
# backslashes literal, so you write standard LaTeX.
theme: study
math: latex
blocks:
  - { type: header, text: "Calculus — Derivatives" }

  - { type: heading, level: 1, text: "Derivatives — Study Summary" }

  - type: callout
    kind: definition
    title: Derivative
    body:
      - type: text
        text: 'The instantaneous rate of change: $f''(x) = \lim_{h \to 0} \frac{f(x+h) - f(x)}{h}$.'

  - { type: heading, level: 2, text: "Core rules" }
  - type: table
    header: ["Rule", "Formula"]
    rows:
      - ["Power", '$\frac{d}{dx} x^n = n x^{n-1}$']
      - ["Product", "$(fg)' = f'g + fg'$"]
      - ["Chain", '$\frac{dy}{dx} = \frac{dy}{du}\,\frac{du}{dx}$']

  - type: callout
    kind: theorem
    title: Fundamental Theorem of Calculus
    body:
      - { type: math, tex: '\int_a^b f''(x)\,dx = f(b) - f(a)' }

  - { type: heading, level: 2, text: "Worked example" }
  - type: columns
    children:
      - - { type: text, text: "Differentiate term by term:" }
        - { type: math, tex: '\frac{d}{dx}\left(3x^2 + 2x\right) = 6x + 2' }
      - - { type: callout, kind: tip, body: [ { type: text, text: "Constants drop; powers step down by one." } ] }

  - { type: footer, text: "Study notes", pageNumbers: true }
