name: Publish

# Publishes to npm when a version tag is pushed (e.g. v0.1.0).
# prepublishOnly (build + typecheck + test) runs as a safety gate.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release for the tag
  id-token: write # required for npm provenance (publishConfig.provenance)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci
      - run: npm publish # provenance via id-token; prepublishOnly gates with build+typecheck+test
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: GitHub Release
        # Idempotent: only create the release if it doesn't already exist, so a
        # re-run (or a manually-created release) can't fail the workflow.
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 \
            || gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
