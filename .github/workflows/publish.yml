name: Publish

# Publishes to npm when a version tag is pushed (e.g. v0.1.0).
# prepublishOnly (build + typecheck + test) runs as a safety gate.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # required for npm provenance (publishConfig.provenance)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
